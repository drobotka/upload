# upload CI — SELF-CONTAINED (not the fleet reusable). upload is a PUBLIC repo and a
# public repo cannot use a private repo's (fleet-governance) reusable workflow — so the
# job body stays here. Same path as local: make bootstrap -> make verify. Python 3.12
# (fleet-uniform). Pure-stdlib gates (cruft/json/assets), no runtime deps.
name: verify
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: bootstrap (env parity)
        run: make bootstrap
      - name: verify (the one merge-gate)
        run: make verify
