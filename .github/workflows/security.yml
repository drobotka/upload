---
# Fleet security scan (OWASP A03 supply-chain / secrets) — separate check from `verify`.
#   * G3  — gitleaks (secret scan) is GATING: a leaked secret fails the merge.
#   * G13 — pip-audit (Python dependency CVEs) + bandit (Python SAST) are ADVISORY
#           (continue-on-error) until triaged per repo, then promoted to gating.
# Free OSS only — no GitHub Advanced Security needed; the merge-gate is THIS job's status
# (works on private repos on any plan). Actions pinned to commit SHA (D-fg-05); the Python
# tools are installed in CI only, so the governance tooling stays dependency-free (D-fg-03).
name: security
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: read   # gitleaks lists PR commits via the API (private repos need this)
jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: gitleaks (secret scan - GATING, G3; license-free MIT CLI, D-fg-33)
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gl.tgz
          echo "${GITLEAKS_SHA256}  /tmp/gl.tgz" | sha256sum -c -
          tar -xzf /tmp/gl.tgz -C /tmp gitleaks
          /tmp/gitleaks version
          # Scan only the commits introduced by THIS event - parity with the former
          # gitleaks-action (PRs scan base..head; pushes scan before..after). Pre-existing
          # history is out of scope; the hard in-repo gate (secret_scan.py / fleet-secrets)
          # covers the working tree.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            LOGOPTS='--no-merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}'
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            LOGOPTS='-1'
          else
            LOGOPTS='--no-merges ${{ github.event.before }}..${{ github.sha }}'
          fi
          echo "gitleaks log-opts: ${LOGOPTS}"
          /tmp/gitleaks git . --no-banner --redact --log-opts="${LOGOPTS}"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: pip-audit (dependency CVEs — ADVISORY, G13)
        continue-on-error: true
        run: |
          python -m pip install --quiet pip-audit
          if ls requirements*.txt >/dev/null 2>&1; then
            pip-audit $(for f in requirements*.txt; do echo -r "$f"; done)
          elif [ -f pyproject.toml ]; then
            pip-audit
          else
            echo "no requirements*.txt / pyproject.toml — no Python deps to audit"
          fi
      - name: bandit (Python SAST — ADVISORY, G13)
        continue-on-error: true
        run: |
          python -m pip install --quiet bandit
          bandit -r . -ll -x ./.git,./tests,./.pdf-engine,./.standards
