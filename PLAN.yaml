# upload — SSoT slot state (FLEET_BLUEPRINT · Layer-0 Assets, public).
meta:
  repo: upload
  version: 0.1.0
  layer: "0-assets"
  charter: ../fleet-governance/docs/governance/CHARTER.md

slots:
  - id: up-brand-icons
    title: "Brand-/Icon-Set v0.1.0 — erfüllt den web-core-Icon-Vertrag"
    status: in_review
    approval: autonomous
    scope:
      - "brand/icons/*.png — Icon-Set (16-512 + maskable-192/512 + apple-touch) aus Portal-Donor"
      - "brand/og-image.png (1200x630) + brand/{favicon,rd-dark,rd-white}.svg"
      - "brand/MANIFEST.json — Integritaet (sha256 + IHDR-Pixelmasse), generiert"
      - "scripts/verify_assets.py — HARTes Gate: PNG valide, Masse==Dateiname, web-core-Vertrag, OG 1200x630"
    evidence:
      - "make verify GREEN; Quelle: server-intern/portal/assets/icons/ (Brand-Assets, oeffentlich)"
      - "erfuellt web_core/pwa/ICONS.md (icon-192/512 + maskable-512 + apple-touch)"
    dod_checks:
      - gate-assets

  - id: up-fonts
    title: "Self-hosted Woff2 (Poppins, OFL) — loest web-cores System-Font-Fallback ab"
    status: in_review
    approval: autonomous   # Font-Wahl Poppins = Operator-Wahl 2; Self-Host-Umsetzung autonom; OFL-Notice (R11)
    scope:
      - "fonts/poppins/*.woff2 — Poppins latin-subset, Gewichte 400/500/600/700 (~34 KB, self-hosted, CSP-safe)"
      - "fonts/poppins/MANIFEST.json — Integritaet (sha256 + bytes + unicode_range + Quelle), generiert"
      - "fonts/poppins/OFL.txt — SIL OFL-1.1 Third-Party-Notice (R11)"
      - "scripts/verify_fonts.py — HARTes Gate: wOF2-Magic, sha256+bytes==manifest, keine stray woff2, OFL present"
    evidence:
      - "make verify GREEN; gate-fonts: 4 woff2 valid, sha256==manifest, 34740 bytes, OFL-1.1"
      - "Quelle: github.com/google/fonts/ofl/poppins; web-core bindet via @font-face (kein CDN)"
    dod_checks:
      - gate-fonts
    follow_up:
      - "JetBrains Mono woff2 (Mono-Stack) + eigene Brand-Schrift — spaeter (Interim: Poppins)"

  - id: up-bundles
    title: "Browser-/veraPDF-Bundles + Korpora als Release-Assets (pdf-engine-Konsument)"
    status: planned
    approval: operator   # Image/Bundle-Wahl + Groesse (Release-Assets, nicht Repo-Tree)
